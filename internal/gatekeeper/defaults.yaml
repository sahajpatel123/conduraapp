version: "1"
rules:
  # Sensitive apps: deny unconditionally, before any class-based rule.
  - match: { target_app: ["1Password", "Keychain Access", "System Settings"] }
    decide: deny
  # Sensitive sites: banking, health, password-manager flows — always require presence.
  - match: { target_url: "bank,paypal,stripe,health,medical,insurance" }
    decide: require_presence_and_consent
    consent: { type: native_dialog, timeout_seconds: 120, require_user_active: true, on_user_absent: queue }
  # Delegation: known sub-agents require consent; unknown agents deny.
  - match: { class: network, action_kind: delegation.spawn, target_app: ["claude", "ollama"] }
    decide: require_consent
    consent: { type: native_dialog, timeout_seconds: 300, on_timeout: queue }
  - match: { action_kind: delegation.spawn }
    decide: deny
  # Class-based defaults.
  - match: { class: read }
    decide: allow
  - match: { class: write }
    decide: require_consent
    consent: { type: native_dialog, timeout_seconds: 300, on_timeout: queue }
  - match: { class: network }
    decide: require_consent
    consent: { type: native_dialog, timeout_seconds: 300, on_timeout: queue }
  - match: { class: destructive }
    decide: require_presence_and_consent
    consent: { type: native_dialog, timeout_seconds: 120, require_user_active: true, on_user_absent: queue }
