    <!-- pollen core -->
    <rect x="18" y="18" width="4" height="4" fill="#c97b2e"/>
    <rect x="16" y="20" width="2" height="2" fill="#c97b2e"/>
    <rect x="22" y="20" width="2" height="2" fill="#c97b2e"/>
    <rect x="20" y="16" width="2" height="2" fill="#c97b2e"/>
    <rect x="20" y="22" width="2" height="2" fill="#c97b2e"/>
    <!-- synapse ring (ink, pixelated) -->
    <rect x="20" y="6" width="2" height="2" fill="#0b3d2e"/>
    <rect x="20" y="34" width="2" height="2" fill="#0b3d2e"/>
    <rect x="6" y="20" width="2" height="2" fill="#0b3d2e"/>
    <rect x="34" y="20" width="2" height="2" fill="#0b3d2e"/>
    <rect x="12" y="12" width="2" height="2" fill="#0b3d2e"/>
    <rect x="14" y="10" width="2" height="2" fill="#0b3d2e"/>
    <rect x="10" y="14" width="2" height="2" fill="#0b3d2e"/>
    <rect x="28" y="12" width="2" height="2" fill="#0b3d2e"/>
    <rect x="26" y="10" width="2" height="2" fill="#0b3d2e"/>
    <rect x="30" y="14" width="2" height="2" fill="#0b3d2e"/>
    <rect x="12" y="28" width="2" height="2" fill="#0b3d2e"/>
    <rect x="14" y="30" width="2" height="2" fill="#0b3d2e"/>
    <rect x="10" y="26" width="2" height="2" fill="#0b3d2e"/>
    <rect x="28" y="28" width="2" height="2" fill="#0b3d2e"/>
    <rect x="26" y="30" width="2" height="2" fill="#0b3d2e"/>
    <rect x="30" y="26" width="2" height="2" fill="#0b3d2e"/>
  </g>
</svg>
