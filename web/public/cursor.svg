<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Condura custom cursor  a pixel-accurate synapse quill.
       Hot spot at (4,4)  the tip of the quill. The body is a
       hand-drawn ink nib with a pollen pixel at the top, so it
       reads as a precision tool, not a generic arrow. -->
  <g>
    <!-- pollen pixel (top) -->
    <rect x="6" y="2" width="2" height="2" fill="#c97b2e"/>
    <rect x="4" y="4" width="2" height="2" fill="#c97b2e"/>
    <!-- ink nib body  a small diagonal quill -->
    <rect x="6" y="4" width="2" height="2" fill="#14110b"/>
    <rect x="4" y="6" width="2" height="2" fill="#14110b"/>
    <rect x="6" y="6" width="2" height="2" fill="#14110b"/>
    <rect x="8" y="6" width="2" height="2" fill="#14110b"/>
    <rect x="4" y="8" width="2" height="2" fill="#14110b"/>
    <rect x="6" y="8" width="2" height="2" fill="#14110b"/>
    <rect x="8" y="8" width="2" height="2" fill="#14110b"/>
    <rect x="10" y="8" width="2" height="2" fill="#14110b"/>
    <rect x="6" y="10" width="2" height="2" fill="#14110b"/>
    <rect x="8" y="10" width="2" height="2" fill="#14110b"/>
    <rect x="10" y="10" width="2" height="2" fill="#14110b"/>
    <rect x="12" y="10" width="2" height="2" fill="#14110b"/>
    <rect x="8" y="12" width="2" height="2" fill="#14110b"/>
    <rect x="10" y="12" width="2" height="2" fill="#14110b"/>
    <rect x="12" y="12" width="2" height="2" fill="#14110b"/>
    <rect x="10" y="14" width="2" height="2" fill="#14110b"/>
    <rect x="12" y="14" width="2" height="2" fill="#14110b"/>
    <rect x="12" y="16" width="2" height="2" fill="#14110b"/>
    <!-- crisp white outline for contrast on paper -->
    <rect x="2" y="4" width="2" height="2" fill="#ffffff"/>
    <rect x="2" y="6" width="2" height="2" fill="#ffffff"/>
    <rect x="2" y="8" width="2" height="2" fill="#ffffff"/>
    <rect x="4" y="2" width="2" height="2" fill="#ffffff"/>
    <rect x="8" y="2" width="2" height="2" fill="#ffffff"/>
    <rect x="14" y="8" width="2" height="2" fill="#ffffff"/>
    <rect x="14" y="10" width="2" height="2" fill="#ffffff"/>
    <rect x="14" y="12" width="2" height="2" fill="#ffffff"/>
    <rect x="14" y="14" width="2" height="2" fill="#ffffff"/>
    <rect x="14" y="16" width="2" height="2" fill="#ffffff"/>
    <rect x="14" y="18" width="2" height="2" fill="#ffffff"/>
    <rect x="10" y="18" width="2" height="2" fill="#ffffff"/>
    <rect x="8" y="16" width="2" height="2" fill="#ffffff"/>
    <rect x="6" y="14" width="2" height="2" fill="#ffffff"/>
    <rect x="4" y="12" width="2" height="2" fill="#ffffff"/>
  </g>
</svg>
