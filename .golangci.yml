version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocritic
    - gosec
    - bodyclose
    - errorlint
    - gocognit
    - gocyclo
    - goconst
    - mnd
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - thelper
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace

  settings:
    gosec:
      severity: low
      confidence: low
      excludes:
        - G104
        - G107
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-tags:
        - experimental
      disabled-checks:
        - hugeParam
        - paramTypeCombine
    revive:
      severity: warning
      rules:
        - name: var-naming
          severity: warning
        - name: package-comments
          severity: warning
        - name: exported
          severity: warning
        - name: error-strings
          severity: warning
        - name: error-naming
          severity: warning
        - name: if-return
          severity: warning
        - name: var-declaration
          severity: warning
        - name: range
          severity: warning
        - name: receiver-naming
          severity: warning
        - name: time-equal
          severity: warning
        - name: confusing-naming
          severity: warning
        - name: superfluous-else
          severity: warning
        - name: unexported-return
          severity: warning
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "8"
        - "10"
        - "16"
        - "30"
        - "32"
        - "60"
        - "64"
        - "100"
        - "200"
        - "300"
        - "400"
        - "500"
        - "1000"
        - "1024"
        - "4096"
        - "8192"
        - "65536"
        - "0600"
        - "0700"
        - "0755"
      ignored-functions:
        - "^strconv\\.Itoa$"
        - "^strconv\\.FormatInt$"
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 30
    goconst:
      min-occurrences: 4
      ignore-tests: true
      numbers: false
    misspell:
      locale: US
    prealloc:
      simple: true
      range-loops: true
    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    paths:
      - internal/hotkey
      - internal/tray
    rules:
      - path: _test\.go
        linters:
          - mnd
          - gocognit
          - gocyclo
          - paralleltest
          - tparallel
          - dupl
          - funlen
          - noctx
          - gosec
      - path: internal/llm/model_pricing\.go
        linters:
          - mnd
          - goconst
      - path: internal/config/loader\.go
        linters:
          - mnd
      - path: \.pb\.go$
        linters:
          - all
      - path: test/fixtures/
        linters:
          - all
      - path: internal/llm/openai_compat/
        text: "G107.*"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sahajpatel123/synapticapp
  exclusions:
    paths:
      - vendor/
      - test/fixtures/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
