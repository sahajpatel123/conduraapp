version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true
  allow-serial-runners: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocritic
    - gosec
    - bodyclose
    - errorlint
    - gocognit
    - gocyclo
    - goconst
    - mnd
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - thelper
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace

  settings:
    gosec:
      # In Phase 1, we want gosec findings to be visible but not block.
      # Switch to "strict" once we harden for v0.1.0.
      severity: low
      confidence: low
      excludes:
        - G104  # unhandled error: handled by errcheck
        - G107  # URL parameterized: by design for LLM clients
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-tags:
        - experimental
      disabled-checks:
        # hugeParam: passing large structs by pointer instead of by value.
        # We intentionally pass by value for read-only request/response
        # shapes (ChatRequest, ChatResponse, etc.) — the copies are
        # cheaper than heap allocations, and the values can't escape
        # past the call boundary by accident.
        - hugeParam
        # paramTypeCombine: collapse adjacent same-type parameters into
        # one declaration. Style preference, not a correctness issue.
        - paramTypeCombine
    revive:
      severity: warning
      rules:
        - name: var-naming
          severity: warning
        - name: package-comments
          severity: warning
        - name: exported
          severity: warning
        - name: error-strings
          severity: warning
        - name: error-naming
          severity: warning
        - name: if-return
          severity: warning
        - name: var-declaration
          severity: warning
        - name: range
          severity: warning
        - name: receiver-naming
          severity: warning
        - name: time-equal
          severity: warning
        - name: confusing-naming
          severity: warning
        - name: superfluous-else
          severity: warning
        - name: unexported-return
          severity: warning
    mnd:
      # Allow common small numbers in tests and well-known idioms
      # (HTTP status, buffer sizes, file modes, common ports).
      ignored-numbers:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
        - 8
        - 10
        - 16
        - 30
        - 32
        - 60
        - 64
        - 100
        - 200
        - 300
        - 400
        - 500
        - 1000
        - 1024
        - 4096
        - 8192
        - 65536
        - "0600"
        - "0700"
        - "0755"
      ignored-functions:
        - "^strconv\\.Itoa$"
        - "^strconv\\.FormatInt$"
    gocyclo:
      min-complexity: 15
    gocognit:
      # Cognitive complexity threshold. SSE/NDJSON streaming parsers
      # naturally branch on event type, role, finish reason, and tool
      # calls — they read as a long switch with many fall-throughs. A
      # threshold of 30 keeps the check useful for "ordinary" code
      # (the per-function exclusions cover the streaming parsers that
      # legitimately exceed 30).
      min-complexity: 30
    goconst:
      # We consider it noise if a string appears only 2-3 times; usually
      # those are YAML keys, model IDs in tests, or sensible call-site
      # identifiers that don't benefit from being aliased. Bumping to 4
      # surfaces only the repeated patterns that *do* benefit (provider
      # names, autonomy levels, log levels).
      min-occurrences: 4
      ignore-tests: true
      numbers: false
    goimports:
      local-prefixes: github.com/sahajpatel123/synapticapp
    misspell:
      locale: US
    prealloc:
      simple: true
      range-loops: true
    nolintlint:
      allow-leading-space: false
      allow-unused: false
      require-explanation: true
      require-specific: true

  exclusions:
    rules:
      # In tests, allow parallel, t.Logf, etc.
      - path: _test\.go
        linters:
          - mnd
          - gocognit
          - gocyclo
          - paralleltest
          - tparallel
          - dupl
          - funlen
          # Subprocess launching (exec.Command with the test fixture
          # path) and bare net.Listen / net.Dial are fine in tests —
          # they're the canonical way to spin up an isolated daemon
          # or stand up a test listener.
          - noctx
          - gosec
      # model_pricing.go is a static data table; the numbers there
      # are prices and context windows, not magic values.
      - path: internal/llm/model_pricing\.go
        linters:
          - mnd
          - goconst
      # The Default() factory and YAML tag names in config/loader.go
      # are data declarations; the numbers are default values, not
      # magic.
      - path: internal/config/loader\.go
        linters:
          - mnd
      # Generated files
      - path: \.pb\.go$
        linters:
          - all
      # Test fixtures
      - path: test/fixtures/
        linters:
          - all

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/sahajpatel123/synapticapp
  exclusions:
    paths:
      - vendor/
      - test/fixtures/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  exclude-rules:
    - path: internal/llm/openai_compat/
      text: "G107.*"
      # We intentionally use URL parameters from config (e.g., custom OpenAI-compatible providers)

output:
  formats:
    colored-line-number:
      path: stdout
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true
