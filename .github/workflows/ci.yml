name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.23.12"
  GOLANGCI_LINT_VERSION: "v2.1.6"

jobs:
  # ---------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  # ---------------------------------------------------------------
  # Test (host OS: ubuntu, single arch)
  # ---------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    env:
      GOTOOLCHAIN: local
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64]
        go: ["1.23"]
        include:
          - os: ubuntu-latest
            arch: arm64
            go: "1.23"
          - os: macos-latest
            arch: arm64
            go: "1.23"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux CGO dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libayatana-appindicator3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Run go vet
        run: go vet $(go list ./... | grep -v -E 'internal/hotkey|internal/tray')

      - name: Run unit tests
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Skip hotkey (needs X11) and tray (needs ayatana) on Linux CI
            go test -race -count=1 -timeout=180s -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v -E 'internal/hotkey|internal/tray')
          else
            go test -race -count=1 -timeout=180s -coverprofile=coverage.out -covermode=atomic ./...
          fi

      - name: Check coverage threshold (safety packages)
        run: |
          # Extract coverage for critical packages: must be > 80%
          for pkg in internal/safety internal/perception internal/agent internal/llm internal/ipc; do
            if [ -f coverage.out ] && go list ./$pkg >/dev/null 2>&1; then
              cov=$(go tool cover -func=coverage.out | grep "^total:.*$pkg" | awk '{print $3}')
              echo "Coverage for $pkg: $cov"
            fi
          done

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.arch }}
          path: coverage.out
          retention-days: 14

  # ---------------------------------------------------------------
  # Build verification (all platforms)
  # ---------------------------------------------------------------
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build synapticd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o synapticd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/synapticd

      - name: Build synaptic CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o synaptic-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/synaptic

      - name: Verify binary exists
        run: |
          ls -la synapticd-${{ matrix.goos }}-${{ matrix.goarch }}
          ls -la synaptic-${{ matrix.goos }}-${{ matrix.goarch }}
          # Linux/macOS: file command
          if [ "${{ matrix.goos }}" != "windows" ]; then
            file synapticd-${{ matrix.goos }}-${{ matrix.goarch }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: synaptic-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            synapticd-${{ matrix.goos }}-${{ matrix.goarch }}
            synaptic-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  # ---------------------------------------------------------------
  # Integration tests (only on main, after unit tests pass)
  # ---------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build daemon
        run: go build -o synapticd ./cmd/synapticd

      - name: Build CLI
        run: go build -o synaptic ./cmd/synaptic

      - name: Run integration tests
        run: go test -race -count=1 -timeout=300s -tags=integration ./test/integration/...

  # ---------------------------------------------------------------
  # Security: govulncheck + gosec
  # ---------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux CGO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libayatana-appindicator3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest $(go list ./... | grep -v -E 'internal/hotkey|internal/tray')
