name: Release GUI Patch

# Rebuild and upload GUI installers to an existing release (e.g. add NSIS to v0.1.0).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

env:
  GO_VERSION: "1.25.11"
  NODE_VERSION: "20"

jobs:
  build-gui:
    name: GUI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            app/web/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/web/frontend/package-lock.json

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libx11-dev libayatana-appindicator3-dev

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> "$GITHUB_PATH"
          echo "C:\Program Files\NSIS" >> "$GITHUB_PATH"

      - name: Build GUI
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ inputs.tag }}
        run: |
          chmod +x scripts/build-gui.sh
          ./scripts/build-gui.sh

      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/prebuilt/
          retention-days: 3

  upload-gui:
    name: Upload GUI to ${{ inputs.tag }}
    runs-on: ubuntu-latest
    needs: [build-gui]
    if: ${{ always() && !cancelled() }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gui-*
          path: dist/prebuilt
          merge-multiple: true

      - name: Upload GUI assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(dist/prebuilt/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no GUI artifacts" >&2
            exit 1
          fi
          ls -la dist/prebuilt/
          gh release upload "${{ inputs.tag }}" dist/prebuilt/* \
            --clobber -R "${{ github.repository }}"
