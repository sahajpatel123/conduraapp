# GoReleaser config for Synaptic releases.
# Reference: https://goreleaser.com

version: 2

project_name: synaptic

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: synapticd
    main: ./cmd/synapticd
    binary: synapticd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/sahajpatel123/synapticapp/internal/version.Version={{.Version}}
      - -X github.com/sahajpatel123/synapticapp/internal/version.Commit={{.ShortCommit}}
      - -X github.com/sahajpatel123/synapticapp/internal/version.BuildDate={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'

  - id: synaptic
    main: ./cmd/synaptic
    binary: synaptic
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/sahajpatel123/synapticapp/internal/version.Version={{.Version}}
      - -X github.com/sahajpatel123/synapticapp/internal/version.Commit={{.ShortCommit}}
      - -X github.com/sahajpatel123/synapticapp/internal/version.BuildDate={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'

  # Desktop GUI — built on native runners before GoReleaser (see release.yml).
  # Missing prebuilts are skipped so CLI/daemon releases still succeed.
  - id: synaptic-gui
    builder: prebuilt
    binary: synaptic
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    prebuilt:
      path: dist/prebuilt/synaptic-gui-{{ .Os }}-{{ .Arch }}{{ .Ext }}
    ignore: true

archives:
  - id: synapticd-archive
    ids:
      - synapticd
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      synapticd-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - EULA.md

  - id: synaptic-archive
    ids:
      - synaptic
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      synaptic-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - EULA.md

  - id: synaptic-gui-archive
    ids:
      - synaptic-gui
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: windows
        formats:
          - zip
      - goos: darwin
        formats:
          - zip
    name_template: >-
      synaptic-gui-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - EULA.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

nfpms:
  - id: synapticd-deb
    package_name: synapticd
    vendor: Synaptic
    homepage: https://synaptic.app
    maintainer: Synaptic <dev@synaptic.app>
    description: Synaptic AI daemon — local-first desktop agent
    license: Synaptic Freeware EULA
    formats:
      - deb
    bindir: /usr/bin
    ids:
      - synapticd

  - id: synaptic-cli-deb
    package_name: synaptic
    vendor: Synaptic
    homepage: https://synaptic.app
    maintainer: Synaptic <dev@synaptic.app>
    description: Synaptic CLI — control the Synaptic daemon
    license: Synaptic Freeware EULA
    formats:
      - deb
    bindir: /usr/bin
    ids:
      - synaptic

after:
  hooks:
    - >-
      go run ./cmd/gen-update-manifest generate --unsigned
      --version {{ .Tag }}
      --checksums dist/checksums.txt
      --base-url https://github.com/sahajpatel123/synapticapp/releases/download/{{ .Tag }}
      --out dist/update-manifest.json

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  name_template: "Synaptic {{.Version}}"
  header: |
    ## Synaptic {{.Version}}

    Signed binaries and SHA-256 checksums are attached below.
    The update manifest (`update-manifest.json`) is signed with Ed25519 for auto-update.

  footer: |
    ---
    Generated by GoReleaser.

  extra_files:
    - glob: dist/update-manifest.json
    - glob: dist/update-manifest.signed.json

# Platform code signing is run in release.yml when secrets are configured.
# See docs/release-runbook.md.

brews:
  disable: true

nix:
  disable: true
