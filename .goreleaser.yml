# GoReleaser config for Synaptic releases.
# Reference: https://goreleaser.com

version: 2

project_name: synaptic

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: synapticd
    main: ./cmd/synapticd
    binary: synapticd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/sahajpatel123/synapticapp/internal/version.Version={{.Version}}
      - -X github.com/sahajpatel123/synapticapp/internal/version.Commit={{.ShortCommit}}
      - -X github.com/sahajpatel123/synapticapp/internal/version.BuildDate={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'

  - id: synaptic
    main: ./cmd/synaptic
    binary: synaptic
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: synapticd-archive
    ids:
      - synapticd
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - EULA.md

  - id: synaptic-archive
    ids:
      - synaptic
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - EULA.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  name_template: "Synaptic {{.Version}}"
  header: |
    ## Synaptic {{.Version}}

    Signed binaries and SHA-256 checksums are attached below.
    The update manifest (`update-manifest.json`) is signed with Ed25519 for auto-update.

  footer: |
    ---
    Generated by GoReleaser.

brews:
  disable: true

nix:
  disable: true
