# GoReleaser config for Synaptic.
# Phase 1: build only, no release. Real releases in Phase 7.
# Reference: https://goreleaser.com

version: 2

project_name: synaptic

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: synapticd
    main: ./cmd/synapticd
    binary: synapticd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -ldflags=-s -w -X 'github.com/synapticapp/synaptic/internal/version.Version={{.Version}}' -X 'github.com/synapticapp/synaptic/internal/version.Commit={{.ShortCommit}}' -X 'github.com/synapticapp/synaptic/internal/version.BuildDate={{.Date}}'
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: '{{ .CommitTimestamp }}'

  - id: synaptic
    main: ./cmd/synaptic
    binary: synaptic
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -ldflags=-s -w
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: synapticd-archive
    ids:
      - synapticd
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - EULA.md

  - id: synaptic-archive
    ids:
      - synaptic
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - EULA.md

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  # Phase 1: dry run only. Real release config in Phase 7.
  draft: true
  prerelease: auto
  name_template: "Synaptic {{.Version}}"
  header: |
    ## Synaptic {{.Version}}

    See [CLAUDE.md](https://github.com/synapticapp/synaptic/blob/main/CLAUDE.md)
    for the full architecture and [LOGBOOK.md](LOGBOOK.md) for the latest changes.

    ### Downloads
    Find the binary for your platform below. SHA-256 checksums are in `checksums.txt`.

    ### Verifying signatures
    All artifacts are signed with our release GPG key (TBD).

  footer: |
    ---
    Generated by GoReleaser.
  disable: true  # Phase 1: don't auto-publish. Phase 7: enable.

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"

brews:
  # Phase 1: disabled. Phase 7: enable with tap at synapticapp/homebrew-tap.
  disable: true

nix:
  # Phase 1: disabled. Phase 7: enable.
  disable: true

snapshots:
  - id: snapshot
    builds:
      - synapticd
      - synaptic

metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'
